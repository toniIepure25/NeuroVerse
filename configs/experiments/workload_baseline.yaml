experiment_id: synthetic_phase_random_forest
task_type: classification
target: phase_label
prediction_semantics: phase_proxy
model:
  type: random_forest
  n_estimators: 50
  max_depth: 8
split:
  type: stratified
  train_size: 0.7
  val_size: 0.15
  test_size: 0.15
  seed: 42
metrics:
  - accuracy
  - balanced_accuracy
  - macro_f1
  - confusion_matrix
calibration:
  enabled: true
ablation:
  enabled: false
