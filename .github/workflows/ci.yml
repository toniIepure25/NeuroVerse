name: NeuroVerse CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend
        run: |
          cd backend
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Backend tests
        run: |
          cd backend
          python -m pytest app/tests/ -q
      - name: Backend lint
        run: |
          cd backend
          python -m ruff check app/datasets app/ml app/experiments app/api/routes_runtime.py app/api/routes_health.py app/api/routes_acquisition.py app/acquisition app/sessions app/core/telemetry.py

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend
        run: cd frontend && npm ci
      - name: Frontend lint
        run: cd frontend && npm run lint
      - name: Frontend build
        run: cd frontend && npm run build
